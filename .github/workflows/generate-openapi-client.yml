name: Generate OpenAPI JavaScript client

on:
  push:
    paths:
      - 'openapi.yaml'
      - '.github/workflows/generate-openapi-client.yml'
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (required by OpenAPI Generator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate JavaScript client from OpenAPI
        uses: openapitools/openapi-generator-cli@v2.5.0
        with:
          arguments: generate -i openapi.yaml -g javascript -o openapi-client-ts --additional-properties=useES6=true,projectName=brencher-openapi

      - name: Generate Python FastAPI server from OpenAPI
        uses: openapitools/openapi-generator-cli@v2.5.0
        with:
          arguments: generate -i openapi.yaml -g python-fastapi -o openapi-server-py --additional-properties=projectName=brencher-python-server,packageName=brencher_server

