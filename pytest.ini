[pytest]
# Show logging output in tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Also capture logs for failed tests
log_level = INFO
log_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Show output from print statements as well
addopts = -v -s
