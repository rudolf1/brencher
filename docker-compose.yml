version: '3.8'
services:
  brencher-backend:
    build: .
    image: registry.rudolf.keenetic.link/brencher:${version}
    user: 1000:137
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - tmp:/tmp
      - /etc/passwd:/etc/passwd
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.hostname==odroid
#          - node.hostname==rudolf-T
      mode: replicated
    networks:
      - default
      - brencher-net
      - nginx_ingress
    secrets:
      - brencher-secrets

secrets:
  brencher-secrets:
    external: true

volumes:
  tmp:

networks:
  brencher-net:
    driver: overlay
  nginx_ingress:
    external: true


